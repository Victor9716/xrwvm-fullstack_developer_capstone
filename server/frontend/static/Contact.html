<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Link to stylesheet -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            overflow: hidden;
            padding: 10px;
        }

        .navbar a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            display: inline-block;
        }

        .navbar a.active {
            background-color: #04AA6D;
            border-radius: 5px;
        }

        .navbar a:hover {
            background-color: #575757;
        }
        /* hero section */
        .hero img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .hero {
            position: relative;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
    


        /* Contact Section */
        .container {
            padding: 40px;
            text-align: center;
        }

        .contact-box {
            background: white;
            padding: 30px;
            margin: auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a class="active" href="/Contact/">Contact Us</a>
    </div>

    <!-- Contact Content -->
    <div class="hero">
        <img src="/static/dealership.jpg" alt="Car Dealership">
        <div class="hero-text">Get in Touch with Us</div>
    </div>
    <div class="container">
        <div class="contact-box">
            <h1>Contact Us</h1>
            <p><strong>Email:</strong> support@mywebsite.com</p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p><strong>Address:</strong> 123 Tech Street, Silicon Valley, CA</p>
            <p>We’d love to hear from you! Feel free to reach out with any questions or feedback.</p>
        </div>
    </div>

</body>
</html>
